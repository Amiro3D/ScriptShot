name: Take full-page screenshot

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Page URL'
        required: true
      callback:
        description: 'Apps Script web app URL for result'
        required: true
      requestId:
        description: 'Unique request ID'
        required: true

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install puppeteer

      - name: Capture full-page screenshot
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 800 });
            await page.goto('${{ inputs.url }}', { waitUntil: 'networkidle2', timeout: 60000 });
            const buffer = await page.screenshot({ fullPage: true });
            fs.writeFileSync('/tmp/screenshot.png', buffer);
            await browser.close();
          })();
          "

      - name: Create Release and Upload Screenshot
        uses: actions/github-script@v7
        env:
          CALLBACK_URL: ${{ inputs.callback }}
          REQUEST_ID: ${{ inputs.requestId }}
          URL: ${{ inputs.url }}
        with:
          script: |
            const fs = require('fs');
            const image = fs.readFileSync('/tmp/screenshot.png');

            // Create a new release
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: 'screenshot-' + context.runId,
              name: 'Screenshot ' + new Date().toISOString(),
              body: 'Temporary screenshot for ' + process.env.URL
            });

            // Upload the image as an asset
            const asset = await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: 'screenshot.png',
              data: image,
              headers: {
                'content-type': 'image/png',
                'content-length': image.length
              }
            });

            const assetUrl = asset.data.browser_download_url;
            const assetId = asset.data.id;

            // Notify the Apps Script web app
            await fetch(process.env.CALLBACK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                requestId: process.env.REQUEST_ID,
                assetUrl: assetUrl,
                assetId: assetId,
                releaseId: release.data.id
              })
            });
            console.log('Callback sent successfully');
